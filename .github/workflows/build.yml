on:
  push:
    tags:
      - "v*"

name: Builds

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: machine_setup-${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/machine_setup${{ matrix.suffix }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in machine_setup-*; do
            target="${dir#machine_setup-}"
            if [[ "$target" == *"windows"* ]]; then
              zip "../${dir}.zip" -j "$dir"/*
            else
              chmod +x "$dir"/*
              tar czf "../${dir}.tar.gz" -C "$dir" .
            fi
          done

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "use_auto=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_auto=false" >> "$GITHUB_OUTPUT"
            {
              echo 'notes<<CHANGELOG_EOF'
              echo "$NOTES"
              echo 'CHANGELOG_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "machine_setup-*.tar.gz,machine_setup-*.zip"
          generateReleaseNotes: ${{ steps.changelog.outputs.use_auto == 'true' }}
          body: ${{ steps.changelog.outputs.use_auto == 'false' && steps.changelog.outputs.notes || '' }}
          token: ${{ secrets.REPO_TOKEN }}
